<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desviaciones de Inventario -- La Plata SRL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0f172a;
  --bg-secondary:#1e293b;
  --bg-card:#1e293b;
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --accent-blue:#3b82f6;
  --accent-green:#10b981;
  --accent-amber:#f59e0b;
  --accent-red:#ef4444;
  --border:#334155;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  padding:2rem;
}
.header{margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.header-left h1{font-size:28px;font-weight:600;margin-bottom:0.5rem}
.header-left p{color:var(--text-secondary);font-size:14px}
.back-btn{
  padding:0.5rem 1rem;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  color:var(--text-primary);
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  display:none;
}
.back-btn:hover{border-color:var(--text-secondary)}
.back-btn.show{display:inline-block}
.msel{position:relative;display:inline-block}
.msel-btn{
  padding:0.5rem 1rem;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  color:var(--text-primary);
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:0.5rem;
}
.msel-btn:hover{border-color:var(--text-secondary)}
.msel-drop{
  display:none;
  position:absolute;
  top:100%;
  right:0;
  margin-top:0.5rem;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:100;
  min-width:200px;
  padding:0.5rem;
}
.msel-drop.open{display:block}
.msel-item{
  display:flex;
  align-items:center;
  gap:0.5rem;
  padding:0.5rem;
  cursor:pointer;
  border-radius:4px;
  font-size:13px;
}
.msel-item:hover{background:var(--bg-secondary)}
.msel-item input{cursor:pointer}
.msel-item label{cursor:pointer;flex:1;user-select:none}
.content{display:none}
.content.active{display:block}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem}
.chart-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  cursor:pointer;
  transition:all 0.2s;
}
.chart-card:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.chart-title{font-size:14px;font-weight:600;margin-bottom:1rem;text-align:center;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px}
.chart-wrapper{position:relative;height:200px}
.chart-stats{display:flex;justify-content:space-around;margin-top:1rem;font-size:12px}
.chart-stat{text-align:center}
.chart-stat-value{font-size:20px;font-weight:700;margin-bottom:0.25rem}
.chart-stat-label{color:var(--text-secondary);font-size:11px}
.aud-section{margin-bottom:2rem}
.section-title{font-size:18px;font-weight:600;margin-bottom:1rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px}
.aud-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem}
.aud-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.25rem;
  cursor:pointer;
  transition:all 0.2s;
}
.aud-card:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.aud-name{font-size:14px;font-weight:600;margin-bottom:1rem}
.aud-total{font-size:32px;font-weight:700;color:var(--accent-blue);text-align:center;margin-bottom:0.5rem}
.aud-label{font-size:11px;color:var(--text-secondary);text-align:center}
.detail-section{display:none}
.detail-section.active{display:block}
.detail-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:2rem;
}
.detail-title{font-size:24px;font-weight:600}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:2rem}
.kpi-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.25rem;
  cursor:pointer;
  transition:all 0.2s;
}
.kpi-card:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.kpi-label{color:var(--text-secondary);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem}
.kpi-value{font-size:32px;font-weight:700;margin-bottom:0.25rem}
.kpi-card.blue .kpi-value{color:var(--accent-blue)}
.kpi-card.green .kpi-value{color:var(--accent-green)}
.kpi-card.amber .kpi-value{color:var(--accent-amber)}
.kpi-card.red .kpi-value{color:var(--accent-red)}
.kpi-desc{color:var(--text-secondary);font-size:13px}
.chart-container-large{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  margin-bottom:2rem;
}
.chart-container-large .chart-title{text-align:left;margin-bottom:1.5rem}
.chart-large{height:300px;position:relative}
.table-container{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:2rem;
}
.table-header{
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:1rem;
}
.table-title{font-size:16px;font-weight:600}
.filters{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.filter-label{color:var(--text-secondary);font-size:13px}
.badge{
  padding:0.35rem 0.75rem;
  border-radius:6px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.2s;
}
.badge:hover{opacity:0.8}
.badge.completo{background:#10b98120;color:#10b981;border-color:#10b98140}
.badge.parcial{background:#f59e0b20;color:#f59e0b;border-color:#f59e0b40}
.badge.pendiente{background:#ef444420;color:#ef4444;border-color:#ef444440}
.badge.active{border-color:currentColor;box-shadow:0 0 0 2px currentColor}
.search-box{
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
}
.search-box input{
  width:100%;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  color:var(--text-primary);
  padding:0.5rem 1rem;
  border-radius:6px;
  font-size:13px;
}
.search-box input::placeholder{color:var(--text-secondary)}
.table-wrapper{max-height:600px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;
  padding:1rem 1.5rem;
  background:var(--bg-secondary);
  color:var(--text-secondary);
  font-weight:500;
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:0.5px;
  position:sticky;
  top:0;
  z-index:1;
}
td{padding:1rem 1.5rem;border-bottom:1px solid var(--border);color:var(--text-primary)}
tr:last-child td{border-bottom:none}
tr:hover{background:var(--bg-secondary)}
tr.group-header td{
  background:var(--bg-primary);
  font-weight:600;
  font-size:12px;
  padding:0.75rem 1.5rem;
}
.status-badge{
  display:inline-block;
  padding:0.25rem 0.75rem;
  border-radius:12px;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
}
.status-badge.completo{background:#10b98120;color:#10b981}
.status-badge.pendiente{background:#ef444420;color:#ef4444}
.status-badge.parcial{background:#f59e0b20;color:#f59e0b}
.reason{font-size:11px;color:var(--accent-amber);margin-top:0.25rem;font-style:italic}
.empty{text-align:center;padding:3rem;color:var(--text-secondary);font-size:14px}
.desv-detail{
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:8px;
  padding:1rem;
  margin-top:1rem;
  display:none;
}
.desv-detail.show{display:block}
.desv-detail-title{font-size:14px;font-weight:600;margin-bottom:1rem;color:var(--accent-red)}
.collapsible-section{margin-bottom:2rem}
.collapsible-header{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.collapsible-header:hover{border-color:var(--accent-blue)}
.collapsible-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:1rem}
.collapsible-count{
  background:var(--accent-blue);
  color:var(--text-primary);
  padding:0.25rem 0.75rem;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
}
.collapsible-count.green{background:var(--accent-green)}
.collapsible-count.amber{background:var(--accent-amber)}
.collapsible-count.red{background:var(--accent-red)}
.collapsible-arrow{
  font-size:20px;
  color:var(--text-secondary);
  transition:transform 0.2s;
}
.collapsible-section.open .collapsible-arrow{transform:rotate(90deg)}
.collapsible-content{
  display:none;
  margin-top:1rem;
}
.collapsible-section.open .collapsible-content{display:block}
@media(max-width:768px){
  .chart-grid{grid-template-columns:1fr}
  .aud-grid{grid-template-columns:1fr}
}
</style>
</head>

        barsTop5+='<div style="font-size:12px;color:#3B6D11;margin-bottom:8px">Sin desviaciones</div>';
      }else{
        var filtered=inv.D.filter(function(x){return x.l.toLowerCase().indexOf('desc')<0&&x.l.toLowerCase().indexOf('erron')<0;});
        filtered.forEach(function(x){
          var xpct=Math.round(x.v/maxV2*100);
          var xcol=xpct>=50?'#E24B4A':xpct>=20?'#EF9F27':'#639922';
          barsTop5+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
          barsTop5+='<span style="font-size:12px;color:var(--text-primary);flex:1">'+x.l+'</span>';
          barsTop5+='<div style="width:80px;background:var(--border);border-radius:3px;height:6px"><div style="width:'+xpct+'%;height:100%;background:'+xcol+';border-radius:3px"></div></div>';
          barsTop5+='<span style="font-size:12px;font-weight:500;color:'+xcol+';width:24px;text-align:right">'+x.v+'</span>';
          barsTop5+='</div>';
        });
        barsTop5+='<div style="font-size:12px;font-weight:500;color:var(--text-accent);margin-top:6px">Total: '+inv.T+'</div>';
      }
    });
    barsTop5+='</div>';
  }
});
barsTop5+='</div>';
  var _selTipo=window._selTipo||null;
var barsTipos='<div id="tipos-bars">';
topTipos.forEach(function(t,i){
  var pct=Math.round(t[1]/maxTipo*100);
  var col=pct>=80?'#E24B4A':pct>=40?'#EF9F27':'#639922';
  var active=_selTipo===t[0];
  var rowStyle='display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;padding:4px 6px;border-radius:6px;background:'+(active?'var(--bg-accent)':'transparent');
  barsTipos+='<div style="'+rowStyle+'" onclick="window._selTipo=(window._selTipo===\''+t[0]+'\'?null:\'' +t[0]+ '\');renderDetailDesv()">'
    +'<span style="font-size:12px;width:120px;flex-shrink:0;color:var(--text-primary)">'+t[0]+'</span>'
    +'<div style="flex:1;background:var(--surface-0);border-radius:4px;height:8px"><div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:4px"></div></div>'
    +'<span style="font-size:12px;font-weight:500;color:'+col+';width:28px;text-align:right">'+t[1]+'</span>'
    +'</div>';
  if(active){
    var locMap={};
    desv.forEach(function(d){
      d.D.filter(function(x){return x.l===t[0];}).forEach(function(x){
        var num=(d.L.match(/^(\d+)/)||['',''])[1];
        var key=d.L;
        locMap[key]=(locMap[key]||0)+x.v;
      });
    });
    var locRank=Object.entries(locMap).sort(function(a,b){return b[1]-a[1];});
    var maxLoc=locRank.length>0?locRank[0][1]:1;
    barsTipos+='<div style="background:var(--surface-0);border-radius:8px;padding:12px 14px;margin:4px 0 10px 0">';
    barsTipos+='<div style="font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Locales con "'+t[0]+'"</div>';
    locRank.forEach(function(lr,j){
      var lp=Math.round(lr[1]/maxLoc*100);
      barsTipos+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">';
      barsTipos+='<span style="font-size:11px;color:var(--text-muted);width:16px;text-align:right">'+(j+1)+'</span>';
      barsTipos+='<span style="font-size:12px;color:var(--text-primary);flex:1">'+lr[0].split('-').slice(0,2).join('-').trim()+'</span>';
      barsTipos+='<div style="width:80px;background:var(--border);border-radius:3px;height:6px"><div style="width:'+lp+'%;height:100%;background:'+col+';border-radius:3px"></div></div>';
      barsTipos+='<span style="font-size:12px;font-weight:500;color:'+col+';width:24px;text-align:right">'+lr[1]+'</span>';
      barsTipos+='</div>';
    });
    barsTipos+='</div>';
  }
});
barsTipos+='</div>';
  var rowsDesv=desv.filter(function(d){return d.T>0;}).map(function(d){var z=getZone(d.L)||'-';var zBg=z==='Ernesto'?'#E6F1FB':z==='Alexis'?'#EAF3DE':'var(--surface-0)';var zCol=z==='Ernesto'?'#185FA5':z==='Alexis'?'#3B6D11':'var(--text-secondary)';return '<tr style="cursor:pointer" onclick="showInvDesv(this,\''+d.L+'\',\''+d.F+'\')" ><td>'+d.L+'</td><td><span style="font-size:11px;padding:2px 6px;border-radius:10px;background:'+zBg+';color:'+zCol+'">'+z+'</span></td><td>'+d.F+'</td><td style="text-align:center">'+d.AI.toLocaleString()+'</td><td style="text-align:center;color:#E24B4A;font-weight:500">'+d.T+'</td></tr>';}).join('');
  var el=document.getElementById('detail-desv');
  el.innerHTML='<div class="detail-header" style="display:flex;align-items:center;justify-content:space-between">'
    +'<div class="detail-title">Estadísticas de Desviaciones</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button onclick="S.zona='+q+'all'+q+';renderDetailDesv()" style="'+btnStyle+';'+btnAll+'">Todos</button>'
    +'<button onclick="S.zona='+q+'Ernesto'+q+';renderDetailDesv()" style="'+btnStyle+';'+btnEr+'">Zona Ernesto</button>'
    +'<button onclick="S.zona='+q+'Alexis'+q+';renderDetailDesv()" style="'+btnStyle+';'+btnAl+'">Zona Alexis</button>'
    +'</div></div>'
    +'<div class="kpi-row">'
    +'<div class="kpi-card red"><div class="kpi-label">Total desviaciones</div><div class="kpi-value">'+total+'</div></div>'
    +'<div class="kpi-card blue"><div class="kpi-label">Con desviaciones</div><div class="kpi-value">'+conDesv+'</div></div>'
    +'<div class="kpi-card green"><div class="kpi-label">Sin desviaciones</div><div class="kpi-value">'+sinDesv+'</div></div>'
    +'<div class="kpi-card amber"><div class="kpi-label">Promedio por local</div><div class="kpi-value">'+prom+'</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'
    +'<div class="table-container"><div class="table-header"><div class="table-title">Top locales</div></div><div style="padding:12px 16px">'+barsTop5+'</div></div>'
    +'<div class="table-container"><div class="table-header"><div class="table-title">Por tipo de desviación</div></div><div style="padding:12px 16px">'+barsTipos+'</div></div>'
    +'</div>'
    +'<div class="table-container"><div class="table-header"><div class="table-title">Detalle por local</div></div>'
    +'<div class="table-wrapper"><table><thead><tr><th>Local</th><th>Zona</th><th>Fecha</th><th style="text-align:center">Inventariados</th><th style="text-align:center">Total desv.</th></tr></thead>'
    +'<tbody>'+rowsDesv+'</tbody></table></div></div>';
}
